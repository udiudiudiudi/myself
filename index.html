  function b64ToBytes(b){return Uint8Array.from(atob(b),c=>c.charCodeAt(0));}
  async function unlock(pass){
    const enc=new TextEncoder();
    const baseKey=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:b64ToBytes(SALT),iterations:ITER,hash:"SHA-256"},
      baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
    const data=b64ToBytes(PAYLOAD);
    const ct=data.slice(0,data.length-16), tag=data.slice(data.length-16);
    const full=new Uint8Array(ct.length+tag.length); full.set(ct); full.set(tag,ct.length);
    const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(IV)},key,full);
    return new TextDecoder().decode(plain);
  }
  async function attempt(){
    const pw=document.getElementById('pw').value;
    const err=document.getElementById('err'); err.textContent='';
    try{
      const html=await unlock(pw);
      document.open(); document.write(html); document.close();
    }catch(e){ err.textContent='Incorrect passphrase. Please try again.'; }
  }
  document.getElementById('go').addEventListener('click',attempt);
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')attempt();});
